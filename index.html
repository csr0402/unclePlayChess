<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動棋盤與對話框 | Premium Design</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <!-- Chat Section -->
        <section id="chat-section" class="glass-panel">
            <div class="panel-header">
                <h2>對話框</h2>
                <div class="status-indicator"></div>
            </div>
            <div id="chat-messages" class="scroll-area">
                <div class="message system">系統已連線。正在準備對戰...</div>
            </div>
        </section>

        <!-- Board Section -->
        <section id="board-section" class="glass-panel">
            <div class="panel-header">
                <h2>棋盤</h2>
                <div class="turn-indicator">白方回合</div>
            </div>
            <div class="board-wrapper">
                <div id="chessboard" class="chess-grid">
                    <!-- Board cells will be generated by JS -->
                </div>
            </div>
        </section>
    </div>
    <div id="promotion-overlay">
        <div class="promotion-box">
            <h3>選擇升變棋子</h3>
            <div class="promotion-options">
                <div class="promo-option" data-piece="Q">♕</div>
                <div class="promo-option" data-piece="R">♖</div>
                <div class="promo-option" data-piece="B">♗</div>
                <div class="promo-option" data-piece="N">♘</div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
